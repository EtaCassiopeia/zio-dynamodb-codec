name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - name: Test
        run: sbt test

      - name: Import PGP key
        run: printf '%s' "$PGP_SECRET" | base64 -d | gpg --batch --dearmor | gpg --batch --import
        env:
          PGP_SECRET: ${{ secrets.PGP_SECRET }}

      - name: Publish to Maven Central
        run: sbt ci-release
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ""
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}

      - name: Update README version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s|@VERSION@|$VERSION|g; s|\"io.github.etacassiopeia\" %% \"zio-blocks-schema-dynamodb\" % \"[^\"]*\"|\"io.github.etacassiopeia\" %% \"zio-blocks-schema-dynamodb\" % \"$VERSION\"|g; s|\"io.github.etacassiopeia\" %% \"zio-dynamodb-codec\" % \"[^\"]*\"|\"io.github.etacassiopeia\" %% \"zio-dynamodb-codec\" % \"$VERSION\"|g" README.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "Update README version to $VERSION"
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
